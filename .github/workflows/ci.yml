# Interleave CI — typecheck, lint, unit/repository tests, and a renderer build on
# the native pnpm toolchain.
#
# The architecture pivoted to an Electron desktop app on native SQLite, and Docker
# was re-scoped to the future server phase — so CI no longer uses Docker/make. It
# runs the same `pnpm` checks the Definition of Done refers to.
#
# The Electron-ABI `better-sqlite3` rebuild (the desktop postinstall) is skipped
# here via `INTERLEAVE_SKIP_ELECTRON_REBUILD`: it is only needed to RUN the Electron
# app (`pnpm dev` / `pnpm e2e` / `pnpm --filter @interleave/desktop dist`), not for
# these checks. The Node-ABI binary the unit tests use is built by better-sqlite3's
# own install script, so Vitest still exercises the real SQLite layer.
#
# The Playwright/Electron E2E runs locally today; running it in CI needs a virtual
# display (xvfb) + the Electron-ABI rebuild and is a planned follow-up.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      CI: "true"
      # The Electron app is not launched in CI, so skip its native rebuild (see header).
      INTERLEAVE_SKIP_ELECTRON_REBUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit + repository tests
        run: pnpm test

      - name: Build renderer
        run: pnpm --filter @interleave/web build
